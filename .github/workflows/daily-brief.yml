name: daily-brief

# 매일 자동 실행 + 수동 실행 버튼
on:
  schedule:
    # UTC 기준. 22:00 UTC = 한국 오전 7시
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # Actions 탭에서 손으로도 돌릴 수 있게

permissions:
  contents: write          # feed.json 커밋을 위해 필요

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 수집·요약 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LOOKBACK_HOURS: "720"
          CLAUDE_MODEL: "claude-haiku-4-5-20251001"
          OUT_PATH: "docs/feed.json"
        run: python collect.py

      - name: 변경분 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/feed.json
          git commit -m "update feed $(date -u +%Y-%m-%d)" || echo "변경 없음"
          git push
